<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Quản Lý Nhà Trọ</title>
    <link rel="stylesheet" href="css/style.css?v=2">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div id="app">
        <!-- Navigation -->
        <nav class="glass-nav">
            <div class="container nav-container">
                <div class="logo">HostelPro</div>
                <ul id="nav-links">
                    <!-- Dynamic links -->
                </ul>
                <div id="auth-status" class="auth-status-container">
                    <!-- User info & Logout -->
                </div>
            </div>
        </nav>

        <main id="main-content">
            <!-- Dynamic content -->
        </main>

        <footer style="background: #1a202c; color: white; padding: 4rem 0; margin-top: 4rem;">
            <div class="container" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 2rem;">
                <div>
                    <h3>HostelPro</h3>
                    <p style="opacity: 0.7; margin-top: 1rem;">Phần mềm quản lý nhà trọ toàn diện và chuyên nghiệp nhất.</p>
                </div>
                <div>
                    <h4>Giải pháp</h4>
                    <ul style="list-style: none; opacity: 0.7; margin-top: 1rem;">
                        <li>Quản lý phòng</li>
                        <li>Quản lý khách thuê</li>
                        <li>Tối ưu hóa doanh thu</li>
                    </ul>
                </div>
                <div>
                    <h4>Liên hệ</h4>
                    <ul style="list-style: none; opacity: 0.7; margin-top: 1rem;">
                        <li>Email: support@hostelpro.com</li>
                        <li>Hotline: 1900 xxxx</li>
                    </ul>
                </div>
            </div>
        </footer>
    </div>

    <!-- Modals / Toast -->
    <div id="toast" class="toast"></div>

    <script src="js/auth.js"></script>
    <script src="js/admin.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
